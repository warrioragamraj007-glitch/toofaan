name: Deploy PHP Site (Toofaan)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Deploy to server (safe + no permission issues)
      - name: Deploy to Server
        run: |
          sudo rsync -av --no-group \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='config.php' \
            --exclude='uploads/' \
            ./ /var/www/html/toofaan/

      # 3. Fix permissions (important for PHP/Moodle-Test)
      - name: Set Permissions
        run: |
          sudo chown -R www-data:www-data /var/www/html/toofaan/
          sudo chmod -R 755 /var/www/html/toofaan/

      # 4. Purge Moodle cache (safe check)
      - name: Purge Cache
        run: |
          if [ -f "/var/www/html/toofaan/admin/cli/purge_caches.php" ]; then
            sudo -u www-data php /var/www/html/toofaan/admin/cli/purge_caches.php
          fi
